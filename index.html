<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Политика безопасности: разрешаем загрузку только с собственного источника -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="color-scheme" content="light dark">
  <title>Где он лёг — анкета персонажа</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">

    <!-- ───────── Боковая панель: список персонажей ───────── -->
    <aside class="sidebar" id="sidebar">
      <header class="sidebar__header">
        <h1 class="sidebar__title">⚓ Где он лёг</h1>
        <p class="sidebar__subtitle">карточки героев</p>
      </header>

      <nav class="sidebar__list" id="character-list" aria-label="Список персонажей"></nav>

      <div class="sidebar__actions">
        <button class="btn btn--primary" id="btn-add-character" title="Создать нового персонажа">
          + Новый герой
        </button>
        <div class="sidebar__row">
          <button class="btn btn--ghost" id="btn-import" title="Импортировать персонажей из файла JSON">Импорт</button>
          <button class="btn btn--ghost" id="btn-export-all" title="Скачать всех персонажей одним файлом JSON">Экспорт всех</button>
        </div>
      </div>

      <footer class="sidebar__footer">
        <button class="btn btn--ghost btn--small" id="btn-theme" title="Переключить тему">🌙 Тема</button>
        <span class="sidebar__hint" id="save-indicator" aria-live="polite"></span>
      </footer>
    </aside>

    <!-- ───────── Основная область: анкета ───────── -->
    <main class="main" id="main">
      <div class="topbar">
        <button class="btn btn--ghost btn--small topbar__menu" id="btn-toggle-sidebar" title="Показать или скрыть список">☰</button>
        <div class="topbar__spacer"></div>
        <button class="btn btn--ghost btn--small" id="btn-export-md" title="Скачать анкету в формате Markdown">↓ Markdown</button>
        <button class="btn btn--ghost btn--small" id="btn-export-json" title="Скачать анкету в формате JSON">↓ JSON</button>
        <button class="btn btn--ghost btn--small" id="btn-duplicate" title="Создать копию персонажа">⧉ Дублировать</button>
        <button class="btn btn--danger btn--small" id="btn-delete" title="Удалить персонажа">Удалить</button>
      </div>

      <div class="sheet" id="sheet">
        <!-- Анкета отрисовывается скриптом -->
      </div>

      <div class="empty" id="empty-state" hidden>
        <p class="empty__icon">📖</p>
        <p>Пока нет ни одного героя.</p>
        <p class="empty__hint">Нажмите «+ Новый герой», чтобы начать.</p>
      </div>
    </main>
  </div>

  <!-- Скрытый input для импорта файлов -->
  <input type="file" id="import-input" accept="application/json,.json" hidden>

  <script type="module" src="js/app.js"></script>
</body>
</html>
