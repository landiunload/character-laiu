<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Строгая Content Security Policy: скрипты и стили только со своего источника,
         wasm-unsafe-eval необходим среде выполнения WebAssembly -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' data:; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'" />
    <title>Character-laiu — анкета персонажа</title>
    <base href="/" />
    <link rel="stylesheet" href="css/application.css" />
</head>
<body>
    <div id="application-root">
        <div class="loading-placeholder">Загрузка приложения…</div>
    </div>

    <script src="js/browserInterop.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
